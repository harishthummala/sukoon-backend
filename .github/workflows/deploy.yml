name: Deploy Sukoon Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: haishthummala/sukoon-backend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull haishthummala/sukoon-backend:latest
            docker stop sukoon-backend || true
            docker rm sukoon-backend || true
            docker run -d \
              --name sukoon-backend \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e JWT_EXPIRATION=86400000 \
              -e AI_API_KEY=${{ secrets.AI_API_KEY }} \
              -e AI_API_URL=${{ secrets.AI_API_URL }} \
              -e GOOGLE_CLIENT_ID=772681843196-dqudmnoc3iqf2np8cjl2836enqtam0st.apps.googleusercontent.com \
              --restart always \
              haishthummala/sukoon-backend:latest
            docker image prune -f
            echo "✅ Deployment complete!"
